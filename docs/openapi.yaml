openapi: 3.1.0
info:
  title: To-Do List API
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Local development servers
  - url: https://itis-4166-final-project-au83.onrender.com/api
    description: Production server

tags:
  - name: Lists
    description: ToDoList related endpoints
  - name: Items
    description: ToDoListItem related endpoints
  - name: Notes
    description: ToDoListNote related endpoints
  - name: Users
    description: User related endpoints
  - name: Auth
    description: Authentication related endpoints
  - name: Monitoring
    description: Operational endpoints, such as health checks

paths:
  /list:
    post:
      security:
        - bearerAuth: []
      tags:
        - Lists
      summary: Create a new to-do list
      description: 
        Create a new to-do list entity. USER roles can only create new lists for themselves. 
        ADMIN roles can create a new to-do list for any user.
      requestBody:
        description:
          Data for the new to-do list. The attributes 'isPublic' and 'ownerId' are optional, and default to 
          false and the ID of the user making the request respectively.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToDoList"
      responses:
        '201':
          description: ToDoList successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToDoList"
        '400':
          $ref: "#/components/responses/InvalidToDoListInput"
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403':
          $ref: "#/components/responses/Forbidden"
  
  /list/all:
    get:
      security:
        - bearerAuth: []
      tags:
        - Lists
      summary: Get all to-do lists
      description: 
        Retrieves all to-do lists. Usable by ADMIN roles only.
      responses:
        '200':
          description: All to-do lists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ToDoList'
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403':
          $ref: "#/components/responses/Forbidden"
  
  /list/public:
    get:
      tags:
        - Lists
      summary: Get all public to-do lists.
      description: 
        Retrieves all public to-do lists. Anyone can acccess, authentication not required.
      responses:
        '200':
          description: All public to-do lists.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ToDoList'

  /list/{list_id}:
    get:
      security:
        - bearerAuth: []
        - {}
      tags:
        - Lists
      summary: Get a specific To-Do list
      description: 
        Retrieves the ToDoLost data for a list. If the list is public, authentication is not required and anyone can access.
        Otherwise, USER roles may only access private lists they own. ADMIN roles can access all lists.
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '200':
          description: Info for the specified list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ToDoList'
        '400':
          $ref: '#/components/responses/InvalidListId'
        '401':
          $ref: "#/components/responses/UnauthorizedResource"
        '403':
          $ref: "#/components/responses/Forbidden"
        '404':
          $ref: '#/components/responses/ToDoListNotFound'
    put:
      security:
        - bearerAuth: []
      tags:
        - Lists
      summary: Updates a specific to-do list.
      description:
        Updates info for a specific to-do list. Used to change 'title' and 'isPublic' attributes. 
        USER roles may only update their own lists. ADMIN roles can update any list.
      parameters:
        - $ref: '#/components/parameters/ListId'
      requestBody:
        description: The new 'title' and 'isPublic' attributes for the list. Only one is required.
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: "To-Do List 1"
                isPublic:
                  type: boolean
                  example: false
      responses:
        '200':
          description: The updated list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToDoList"
        '400':
          description: Invalid Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: 
                    type: string
                  details:
                    type: array
                    items:
                      type: string
                example: 
                  error:
                    "Validation failed"
                  details:
                    - "At least one field (title, isPublic) must be provided"
                    - "URL parameter 'list_id' must be a positive integer."
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403':
          $ref: "#/components/responses/Forbidden"
        '404':
          $ref: '#/components/responses/ToDoListNotFound'
    delete:
      security:
        - bearerAuth: []
      tags:
        - Lists
      summary: Delete a specific to-do list
      description: Delete a specific to-do list. USER roles may delete their own lists. ADMIN roles may delete any list.
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '204':
          description: List deleted successfully
        '400':
          $ref: '#/components/responses/InvalidListId'
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403':
          $ref: "#/components/responses/Forbidden"
        '404':
          $ref: '#/components/responses/ToDoListNotFound'

  /list/{list_id}/items:
    get:
      security:
        - bearerAuth: []
        - {}
      tags:
        - Lists
        - Items
      summary: Get all of the items for a specific to-do list
      description: 
        Retrieves all the ToDoListItem data for a list. If the list is public, authentication is not required and anyone can access.
        Otherwise, USER roles may only access private lists they own. ADMIN roles can access all lists.
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '200':
          description: All items for the specified to-do list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ToDoListItem'
        '400':
          $ref: '#/components/responses/InvalidListId'
        '401':
          $ref: "#/components/responses/UnauthorizedResource"
        '403':
          $ref: "#/components/responses/Forbidden"
        '404':
          $ref: '#/components/responses/ToDoListNotFound'

  /list/{list_id}/notes:
    get:
      security:
        - bearerAuth: []
        - {}
      tags:
        - Lists
        - Notes
      summary: Get all of the notes for a specific to-do list
      description: 
        Retrieves the ToDoLost data for a list. If the list is public, authentication is not required and anyone can access.
        Otherwise, USER roles may only access private lists they own. ADMIN roles can access all lists.
      parameters:
        - $ref: '#/components/parameters/ListId'
      responses:
        '200':
          description: All notes for the specified to-do list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ToDoListNote'
        '400':
          $ref: '#/components/responses/InvalidListId'
        '401':
          $ref: "#/components/responses/UnauthorizedResource"
        '403':
          $ref: "#/components/responses/Forbidden"
        '404':
          $ref: '#/components/responses/ToDoListNotFound'

# ListItem Endpoints
  /listitem:
    post:
      security:
        - bearerAuth: []
      tags:
        - Items
      summary: Create a new to-do list item and add it to a to-do list.
      description: 
        Create a new to-do list item and adds it to a to-do list. USER roles can only create new items for lists
        they own. ADMIN roles can create a new to-do list item for any list.
      requestBody:
        description:
          Data for the new to-do list item. The attribute 'details' is optional.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToDoListItem"
      responses:
        '201':
          description: ToDoListItem successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToDoListItem"
        '400':
          $ref: "#/components/responses/InvalidToDoListItemInput"
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403':
          $ref: "#/components/responses/Forbidden"

  /listitem/{item_id}:
    get:
      security:
        - bearerAuth: []
        - {}
      tags:
        - Items
      summary: Get a specific to-do list item
      description: 
        Retrieves the ToDoLostItem data for a list. If the associated list is public, authentication is not required and anyone
        can access. Otherwise, USER roles may only access items for private lists they own. ADMIN roles can access items for
        all lists.
      parameters:
        - $ref: '#/components/parameters/ItemId'
      responses:
        '200':
          description: Info for the specified list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ToDoListItem'
        '400':
          $ref: '#/components/responses/InvalidItemId'
        '401':
          $ref: "#/components/responses/UnauthorizedResource"
        '403':
          $ref: "#/components/responses/Forbidden"
        '404':
          $ref: '#/components/responses/ToDoListItemNotFound'
    put:
      security:
        - bearerAuth: []
      tags:
        - Items
      summary: Updates a specific to-do list item.
      description:
        Updates info for a specific to-do list item. Used to change 'name' and 'details' attributes. 
        USER roles may only update items for their own lists. ADMIN roles can update any list item.
      parameters:
        - $ref: '#/components/parameters/ItemId'
      requestBody:
        description: The new 'name' and/or 'details' attributes for the list item. Only one is required.
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "To-Do List Item 1"
                details:
                  type: string
                  optional: true
                  example: "Additional info for item 1"
      responses:
        '200':
          description: The updated list item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToDoListItem"
        '400':
          description: Invalid Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: 
                    type: string
                  details:
                    type: array
                    items:
                      type: string
                example: 
                  error:
                    "Validation failed"
                  details:
                    - "At least one field (name, details) must be provided"
                    - "URL parameter 'item_id' must be a positive integer."
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403':
          $ref: "#/components/responses/Forbidden"
        '404':
          $ref: '#/components/responses/ToDoListItemNotFound'
    delete:
      security:
        - bearerAuth: []
      tags:
        - Items
      summary: Delete a specific to-do list item
      description: 
        Delete a specific to-do list item. USER roles may delete items for their own lists. 
        ADMIN roles may delete items from any list.
      parameters:
        - $ref: '#/components/parameters/ItemId'
      responses:
        '204':
          description: List deleted successfully
        '400':
          $ref: '#/components/responses/InvalidItemId'
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403':
          $ref: "#/components/responses/Forbidden"
        '404':
          $ref: '#/components/responses/ToDoListItemNotFound'


# ListNote Endpoints
  /listnote:
    post:
      security:
        - bearerAuth: []
      tags:
        - Notes
      summary: Create a new to-do list note and add it to a to-do list.
      description: 
        Create a new to-do list note and adds it to a to-do list. USER roles can only create new notes for lists
        they own. ADMIN roles can create a new to-do list note for any list.
      requestBody:
        description:
          Data for the new to-do list note.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToDoListNote"
      responses:
        '201':
          description: ToDoListNote successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToDoListNote"
        '400':
          $ref: "#/components/responses/InvalidToDoListNoteInput"
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403':
          $ref: "#/components/responses/Forbidden"

  /listnote/{note_id}:
    get:
      security:
        - bearerAuth: []
        - {}
      tags:
        - Notes
      summary: Get a specific to-do list note
      description: 
        Retrieves the ToDoLostNote data for a list. If the associated list is public, authentication is not required and anyone
        can access. Otherwise, USER roles may only access notes for private lists they own. ADMIN roles can access notes for
        all lists.
      parameters:
        - $ref: '#/components/parameters/NoteId'
      responses:
        '200':
          description: Info for the specified list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ToDoListNote'
        '400':
          $ref: '#/components/responses/InvalidNoteId'
        '401':
          $ref: "#/components/responses/UnauthorizedResource"
        '403':
          $ref: "#/components/responses/Forbidden"
        '404':
          $ref: '#/components/responses/ToDoListNoteNotFound'
    put:
      security:
        - bearerAuth: []
      tags:
        - Notes
      summary: Updates a specific to-do list note.
      description:
        Updates info for a specific to-do list note. Used to change 'name' and 'details' attributes. 
        USER roles may only update notes for their own lists. ADMIN roles can update any list note.
      parameters:
        - $ref: '#/components/parameters/NoteId'
      requestBody:
        description: The new 'name' and/or 'details' attributes for the list note. Only one is required.
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "To-Do List Note 1"
                details:
                  type: string
                  optional: true
                  example: "Additional info for note 1"
      responses:
        '200':
          description: The updated list note.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToDoListNote"
        '400':
          description: Invalid Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: 
                    type: string
                  details:
                    type: array
                    items:
                      type: string
                example: 
                  error:
                    "Validation failed"
                  details:
                    - "At least one field (name, details) must be provided"
                    - "URL parameter 'note_id' must be a positive integer."
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403':
          $ref: "#/components/responses/Forbidden"
        '404':
          $ref: '#/components/responses/ToDoListNoteNotFound'
    delete:
      security:
        - bearerAuth: []
      tags:
        - Notes
      summary: Delete a specific to-do list note
      description: 
        Delete a specific to-do list note. USER roles may delete notes for their own lists. 
        ADMIN roles may delete notes from any list.
      parameters:
        - $ref: '#/components/parameters/NoteId'
      responses:
        '204':
          description: List deleted successfully
        '400':
          $ref: '#/components/responses/InvalidNoteId'
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403':
          $ref: "#/components/responses/Forbidden"
        '404':
          $ref: '#/components/responses/ToDoListNoteNotFound'

# User Account Endpoints
  /users:
    get:
      security:
        - bearerAuth: []
      tags:
        - Users
      summary: Get all users
      description: Retrieves UserInfo for all users. Only available to the ADMIN role.
      responses:
        '200':
          description: A list of all users with user info.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserInfo'
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403':
          $ref: "#/components/responses/Forbidden"

  /users/{user_id}:
    get:
      security:
        - bearerAuth: []
      tags:
        - Users
      summary: Get a specific user
      description: Retrieves UserInfo for a user. USER roles may only access themselves. ADMIN roles can access all users.
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Info for the specified user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserInfo'
        '400':
          $ref: '#/components/responses/InvalidUserId'
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403':
          $ref: "#/components/responses/Forbidden"
        '404':
          $ref: '#/components/responses/UserNotFound'
    put:
      security:
        - bearerAuth: []
      tags:
        - Users
      summary: Updates info for a specific user.
      description:
        Updates info for a specific user. Used to change email and password for the account. 
        USER roles may only update themselves. ADMIN roles can update all users.
        User roles cannot be set using a put request.
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        description: The new email and/or password for the specified user. Only one is required.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        '200':
          description: The updated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        '400':
          description: Invalid Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: 
                    type: string
                  details:
                    type: array
                    items:
                      type: string
                example: 
                  error:
                    "Validation failed"
                  details:
                    - "At least one field (email, password) must be provided"
                    - "URL parameter 'user_id' must be a positive integer, or the string 'me'"
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403':
          $ref: "#/components/responses/Forbidden"
        '404':
          $ref: '#/components/responses/UserNotFound'
        '409':
          $ref: "#/components/responses/DuplicateEmail"
    patch:
      security:
        - bearerAuth: []
      tags:
        - Users
      summary: Updates the role of a specific user.
      description:
        Updates the role of a specific. For ADMIN use only.
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        description: The new role for the specified user
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
              example:
                role: "ADMIN"
      responses:
        '200':
          description: The updated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        '400':
          description: Invalid Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: 
                    type: string
                  details:
                    type: array
                    items:
                      type: string
                example: 
                  error:
                    "Validation failed"
                  details:
                    - "role must be a string"
                    - "URL parameter 'user_id' must be a positive integer, or the string 'me'"
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403':
          $ref: "#/components/responses/Forbidden"
        '404':
          $ref: '#/components/responses/UserNotFound'
    delete:
      security:
        - bearerAuth: []
      tags:
        - Users
      summary: Delete User
      description: Delete a the specified user. USER roles may delete themselves. ADMIN roles may delete any user.
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '204':
          description: User deleted successfully
        '400':
          $ref: '#/components/responses/InvalidUserId'
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403':
          $ref: "#/components/responses/Forbidden"
        '404':
          $ref: '#/components/responses/UserNotFound'

  /users/{user_id}/list/all:
    get:
      security:
        - bearerAuth: []
      tags:
        - Users
        - Lists
      summary: Get all to-do lists for a specified user.
      description: 
        Retrieves all to-do lists for a specified user. USER roles may only access their own lists with this endpoint.
        ADMIN roles can access lists for all users.
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: All to-do lists for the specified user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ToDoList'
        '400':
          $ref: '#/components/responses/InvalidUserId'
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403':
          $ref: "#/components/responses/Forbidden"
        '404':
          $ref: '#/components/responses/UserNotFound'

  /users/{user_id}/list/public:
    get:
      security:
        - bearerAuth: []
        - {}
      tags:
        - Users
        - Lists
      summary: Get all public to-do lists for a specified user.
      description: 
        Retrieves all public to-do lists for a specified user. Anyone can acccess, but authentication is still
        required if 'user_id' is set to 'me', since that value implies that a user is logged in.
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: All public to-do lists for the specified user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ToDoList'
        '400':
          $ref: '#/components/responses/InvalidUserId'
        '401':
          $ref: "#/components/responses/UnauthorizedMe"
        '404':
          $ref: '#/components/responses/UserNotFound'

# Auth Endpoints
  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate user
      description: Authenticate a user and return an access token.
      requestBody:
        description: User login credentials
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                example: 
                  accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '400':
          $ref: "#/components/responses/InvalidAuthInput"
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example: 
                  error: "Invalid credentials"
  /auth/signup:
    post:
      tags:
        - Auth
      summary: Signup new user
      description: Creates a new user account with a given email and password
      requestBody:
        description: New user login credentials
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        '201':
          description: New user successfully created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        '400':
          $ref: "#/components/responses/InvalidAuthInput"
        '409':
          $ref: "#/components/responses/DuplicateEmail"
  /health:
    get:
      summary: Health Check
      description: Returns the current status of the API. Used by Render to verify that the service is running.
      tags:
        - Monitoring
      responses:
        '200':
          description: API is running successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
components:
  schemas: 
    # User/Auth Schemas:
    AuthCredentials:
      type: object
      properties:
        email:
          type: string
          example: "user@example.com"
        password:
          type: string
          example: password123

    UserInfo:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          example: "user@example.com"
        role:
          type: string
          example: USER
        createdAt:
          type: string
          example: "2026-04-25T22:01:26.110Z"
  
    ToDoList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        title:
          type: string
          example: "To-Do List 1"
        isPublic:
          type: boolean
          example: false
        ownerId:
          type: integer
          example: 1
        createdAt:
          type: string
          readOnly: true
          example: "2026-04-25T22:01:26.110Z"
    
    ToDoListItem:
      type: object
      properties:
