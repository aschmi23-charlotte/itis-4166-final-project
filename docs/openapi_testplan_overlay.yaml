paths:
  /list:
    post:
      test_setup: 
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '201':
          user_steps:
            - Click *Try it out*.
            - Remove the ownerId field from the request body.
            - Execute. Response should return 200. Response fields should match request body.
          admin_steps:
            - Click *Try it out*.
            - Set the ownerId field of the request body to the ID of a different user than the one logged in.
            - Execute. Response should return 200. Response fields should match request body.
        '403':
          $ref: "#/macros/responses/ForbiddenAdminOnly"

  /list/all:
    get:
      test_setup: 
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '200':
          admin_steps:
            - Click *Try it out*.
            - Execute. Response should return 200. Returned array should be populated.
        '403':
          # Replacing a component response. Description required.
          description: User does not have sufficient permissions.
          user_steps:
            - Click *Try it out*.
            - Execute. Response should return 403.


  /list/public:
    get:
      test_setup: 
        - Delete any JWT from SwaggerUI's *Authorize* window.
      responses:
        '200':
          no_auth_steps:
            - Click *Try it out*.
            - Execute. Response should return 200. Returned array should be populated.

  /list/{list_id}:
    get:
      test_setup:
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '200':
          user_steps:
            $ref: "#/macros/step_lists/ListGetSuccessUser"
          admin_steps:
            $ref: "#/macros/step_lists/ListGetSuccessAdmin"
        '401':
          $ref: "#/macros/responses/ListRequiresAuthentication"
        '403':
          $ref: "#/macros/responses/ForbiddenListPublic"
    put:
      test_setup:
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '200':
          user_steps:
            - Click *Try it out*.
            - Set the list_id parameter to an id of a list the user owns.
            - Execute. Response should return 200.
          admin_steps:
            - Click *Try it out*.
            - Set the list_id parameter to an id of a list the user does not own.
            - Execute. Response should return 200. Response fields should match request body.
        '400':
          admin_steps:
            - Paste your JWT with the ADMIN role into SwaggerUI's *Authorize* window.
            - Click *Try it out*.
            - Use a negative number as the list_id.
            - Execute. Response should return 400.
            - Set list_id to an existing list.
            - Remove all fields from the response body.
            - Execute. Response should return 400.
        '403':
          $ref: "#/macros/responses/ForbiddenList"
    delete:
      test_setup:
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '204':
          user_steps:
            - Click *Try it out*.
            - Set the list_id parameter to an id of a list the user owns.
            - Execute. Response should return 204.
          admin_steps:
            - Click *Try it out*.
            - Set the list_id parameter to an id of a list the user does not own.
            - Execute. Response should return 204.
        '403':
          $ref: "#/macros/responses/ForbiddenList"
  /list/{list_id}/items:
    get:
      test_setup:
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '200':
          user_steps:
            $ref: "#/macros/step_lists/ListGetSuccessUser"
          admin_steps:
            $ref: "#/macros/step_lists/ListGetSuccessUser"
        '401':
          $ref: "#/macros/responses/ListRequiresAuthentication"
        '403':
          $ref: "#/macros/responses/ForbiddenListPublic"
  /list/{list_id}/notes:
    get:
      test_setup:
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '200':
          user_steps:
            $ref: "#/macros/step_lists/ListGetSuccessUser"
          admin_steps:
            $ref: "#/macros/step_lists/ListGetSuccessUser"
        '401':
          $ref: "#/macros/responses/ListRequiresAuthentication"
        '403':
          $ref: "#/macros/responses/ForbiddenListPublic"
  /listitem:
    post:
      test_setup: 
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '201':
          user_steps:
            $ref: "#/macros/step_lists/ListMemberPostSuccessUser"
          admin_steps:
            $ref: "#/macros/step_lists/ListMemberPostSuccessAdmin"
        '403':
          $ref: "#/macros/responses/ForbiddenListMemberPost"
  /listitem/{item_id}:
    get:
      test_setup: 
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '200':
          no_auth_steps:
            - Click *Try it out*.
            - Set the item_id parameter to the id of an item where the associated list is public.
            - Execute. Response should return 200.
          user_steps:
            - Click *Try it out*.
            - Set the item_id parameter to the id of an item where the associated list is private and owned of the logged in user.
            - Execute. Response should return 200.
          admin_steps:
            - Click *Try it out*.
            - Set the item_id parameter to the id of an item where the associated list is private and not owned of the logged in user.
            - Execute. Response should return 200.
        '401':
          description: Client is not authenticated, and requested resource requires authentication.
          no_auth_steps:
            - Click *Try it out*.
            - Set the item_id parameter to the id item where the listId points to a private list.
            - Execute. Response should return 401.
        '403':
          $ref: "#/macros/responses/ForbiddenListItemPublic"
    put:
      test_setup: 
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '200':
          user_steps:
            - Click *Try it out*.
            - Set the item_id parameter to the id of an item where the associated list is owned of the logged in user.
            - Execute. Response should return 200.
          admin_steps:
            - Click *Try it out*.
            - Set the item_id parameter to the id of an item where the associated list is not owned of the logged in user.
            - Execute. Response should return 200.
        '400':
          admin_steps:
            - Click *Try it out*.
            - Use a negative number as the item_id.
            - Execute. Response should return 400.
            - Set item_id to an existing item.
            - Remove all fields from the response body.
            - Execute. Response should return 400.
        '403':
          $ref: "#/macros/responses/ForbiddenListItem"
    delete:
      test_setup: 
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '204':
          user_steps:
            - Click *Try it out*.
            - Set the item_id parameter to the id of an item where the associated list is owned of the logged in user.
            - Execute. Response should return 204.
          admin_steps:
            - Click *Try it out*.
            - Set the item_id parameter to the id of an item where the associated list is not owned of the logged in user.
            - Execute. Response should return 204.
        '403':
          $ref: "#/macros/responses/ForbiddenListItem"
  /listnote:
    post:
      test_setup: 
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '201':
          user_steps:
            $ref: "#/macros/step_lists/ListMemberPostSuccessUser"
        '403':
          $ref: "#/macros/responses/ForbiddenListMemberPost"
  /listnote/{note_id}:
    get:
      test_setup: 
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '200':
          no_auth_steps:
            - Click *Try it out*.
            - Set the note_id parameter to the id of an note where the associated list is public.
            - Execute. Response should return 200.
          user_steps:
            - Click *Try it out*.
            - Set the note_id parameter to the id of an note where the associated list is private and owned of the logged in user.
            - Execute. Response should return 200.
          admin_steps:
            - Click *Try it out*.
            - Set the note_id parameter to the id of an note where the associated list is private and not owned of the logged in user.
            - Execute. Response should return 200.
        '401':
          description: Client is not authenticated, and requested resource requires authentication.
          no_auth_steps:
            - Click *Try it out*.
            - Set the note_id parameter to the id note where the listId points to a private list.
            - Execute. Response should return 401.
        '403':
          $ref: "#/macros/responses/ForbiddenListNotePublic"
    put:
      test_setup: 
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '200':
          user_steps:
            - Click *Try it out*.
            - Set the note_id parameter to the id of an note_id where the associated list is owned of the logged in user.
            - Execute. Response should return 200.
          admin_steps:
            - Click *Try it out*.
            - Set the note_id parameter to the id of an note_id where the associated list is not owned of the logged in user.
            - Execute. Response should return 200.
        '400':
          admin_steps:
            - Click *Try it out*.
            - Use a negative number as the note_id.
            - Execute. Response should return 400.
            - Set note_id to an existing note_id.
            - Remove all fields from the response body.
            - Execute. Response should return 400.
        '403':
          $ref: "#/macros/responses/ForbiddenListNote"
    delete:
      test_setup: 
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '204':
          user_steps:
            - Click *Try it out*.
            - Set the item_id parameter to the id of an item where the associated list is owned of the logged in user.
            - Execute. Response should return 204.
          admin_steps:
            - Click *Try it out*.
            - Set the item_id parameter to the id of an item where the associated list is not owned of the logged in user.
            - Execute. Response should return 204.
        '403':
          $ref: "#/macros/responses/ForbiddenListNote"
  /users:
    get:
      test_setup: 
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '200': 
          admin_steps:
            - Click *Try it out*.
            - Execute. Response should return 200.
        '403':
          $ref: "#/macros/responses/ForbiddenAdminOnly"
  /users/{user_id}:
    get:
      test_setup:  
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '200':
          user_steps:
            - Click *Try it out*.
            - Set the user_id parameter to 'me' (without quotes).
            - Execute. Response should return 200.
            - Set the user_id parameter to the actual numerical id of your logged in user (this will be the "id" field of the last response).
            - Execute. Response should return 200, and the response should be the same.
          admin_steps:
            - Execute. Response should return 200.
            - Set the user_id parameter to the id of any other existing user.
            - Execute. Response should return 200.
        '403':
          $ref: "#/macros/responses/ForbiddenUserId"
    put:
      test_setup: 
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '200':
          user_steps:
            - Click *Try it out*.
            - Set the user_id parameter to 'me' (without quotes).
            - Set the "email" field of the request body to a valid email address not used by another user.
            - Execute. Response should return 200.
            - Set the user_id parameter to the actual numerical id of your logged in user (this will be the "id" field of the last response).
            - Set the "email" field of the request body to a different valid email address not used by another user.
            - Execute. Response should return 200, and the response should be the same.
            - "(Note: to avoid potential login problems later, you may want to revert these changes using another request.)"
          admin_steps:
            - Click *Try it out*.
            - Set the user_id parameter to the id of any other existing user (ideally, one you're not using for testing).
            - Set the "email" field of the request body to a valid email address not used by another user.
            - Execute. Response should return 200.
        '400':
          admin_steps:
            - Click *Try it out*.
            - Use a negative number as the user_id.
            - Execute. Response should return 400.
            - Set user_id to the id for an existing user.
            - Remove the @ symbol from the email address.
            - Execute. Response should return 400.
            - Restore the @ symbol to the email address.
            - Shorten the password to be less than 8 characters.
            - Execute. Response should return 400.
            - Restore the password's length.
            - Remove all fields from the response body.
            - Execute. Response should return 400.
    
        '403':
          $ref: "#/macros/responses/ForbiddenUserId"
        '409':
          description: Duplicate Email
          admin_steps: 
            - Click *Try it out*.
            - Set user_id to 'me' (without quotes).
            - Set the "email" field of the request body to the email address of another user.
            - Execute. Response should return 401.
    patch:
      test_setup: 
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '200':
          admin_steps:
            - Click *Try it out*.
            - Set the user_id parameter to the id of any other existing user (ideally, one you're not using for testing).
            - If the selected user has the USER role, set the "role" field of the request body to "ADMIN". If the selected user has the ADMIN role, set the "role" field of the request body to "USER". 
            - Execute. Response should return 200.
        '400':
          admin_steps:
            - Click *Try it out*.
            - Use a negative number as the item_id.
            - Execute. Response should return 400.
            - Set user_id to the id for an existing user.
            - Remove all fields from the response body.
            - Execute. Response should return 400.
        '403':
          $ref: "#/macros/responses/ForbiddenAdminOnly"
    delete:
      test_setup: 
        - "For testing while logged in as a USER role, we're going to use a different account than usual,
          since we don't want to delete that one. Get a JWT web token using the following credentials, 
          and use it to authenticate in SwaggerUI when testing as a USER:
          `{\"email\": \"user7@example.com\", \"password\": \"prod_secret_user\"}`"
        - For testing while logged in as an ADMIN role, continue to use the JWT you've used thus far.
      responses:
        '204': 
          user_steps:
            - Click *Try it out*.
            - Ensure that the user_id parameter is set to 'me' (without quotes).
            - Execute. Response should return 204.
          admin_steps:
            - Click *Try it out*.
            - Ensure that the user_id parameter is set to the id of any other existing user (8 is recommended).
            - Execute. Response should return 204.
        '403':
          $ref: "#/macros/responses/ForbiddenUserId"
      
  /users/{user_id}/list/all:
    get:
      test_setup: []
      responses:
        '200': 
          user_steps:
            - Click *Try it out*.
            - Ensure that the user_id parameter is set to 'me' (without quotes).
            - Execute. Response should return 200.
          admin_steps:
            - Click *Try it out*.
            - Ensure that the user_id parameter is set to the id of any other existing user.
            - Execute. Response should return 200.
        '403':
          $ref: "#/macros/responses/ForbiddenUserId"
  /users/{user_id}/list/public:
    get:
      test_setup: 
        $ref: "#/macros/test_setup/SetupStoreTokens"
      responses:
        '200':
          no_auth_steps:
            - Click *Try it out*.
            - Ensure that the user_id parameter is set to the id of any existing user.
            - Execute. Response should return 200.

  /auth/login:
    post:
      test_setup:
        - None
      responses:  
        '200':
          no_auth_steps:
            - Click *Try it out*.
            - Set the "email" field to the email address of any existing user, and set the "password" field
              to the corresponding password. (All users seeded with the ADMIN role have "prod_secret_admin"
              set as their initial password. All users with the USER role have "prod_secred_user" set as their
              initial password. Both passwords are without quotes.)
            - Execute. Response should return 200.
        '401':
          no_auth_steps:
            - Click *Try it out*.
            - Set the "email" field to the email address not used by any existing user, and set the "password" field
              to any string between 8 and 64 characters in length.
            - Execute. Response should return 401.
            - Set the "email" field to the email address of any existing user, and set the "password" field
              to any string that is not the user's password (random gibberish such as "asdfghjkl" will work).
            - Execute. Response should return 401.
              
  /auth/signup:
    post:
      test_setup: 
        - None
      responses:  
        '201':
          no_auth_steps:
            - Click *Try it out*.
            - Set the "email" field to the email address not used by any existing user, and set the "password" field
              to any string between 8 and 64 characters in length.
            - Execute. Response should return 201.
  /health:
    get:
      test_setup:
        - None
      responses:
        '200':
          no_auth_steps:
            - Click *Try it out*.
            - Execute. Response should return 200.


components:
  responses:
    Unauthorized:
      no_auth_steps: 
        - Click *Try it out*.
        - Execute. Response should return 401.
        
    UnauthorizedMe:
      no_auth_steps:
        - Click *Try it out*.
        - Ensure the user_id parameter is set to 'me'
        - Execute. Response should return 401.

    UnauthorizedResource:
      no_auth_steps:
        - Click *Try it out*.
        - Ensure the user_id parameter is set to 'me'
        - Execute. Response should return 401.

    # Forbidden:
      # test_steps: []

    # To Do List Errors:
    InvalidListId:
      admin_steps: 
        - Click *Try it out*.
        - Use a negative number as the list_id.
        - Execute. Response should return 401.

    ToDoListNotFound:
      admin_steps: 
        - Click *Try it out*.
        - Set list_id to some valid id that does not exist (for example, 99999).
        - Execute. Response should return 404.

    InvalidToDoListInput:
      admin_steps:
          - Click *Try it out*.
          - Remove the 'title' field from the request body.
          - Execute. Response should return 400.

    # To Do List Item Errors:
    InvalidItemId:
      admin_steps: 
        - Click *Try it out*.
        - Use a negative number as the item_id.
        - Execute. Response should return 401.

    ToDoListItemNotFound:
      admin_steps:
        - Click *Try it out*.
        - Set item_id to some valid id that does not exist (for example, 99999).
        - Execute. Response should return 404.

    InvalidToDoListItemInput:
      admin_steps:
          - Click *Try it out*.
          - Remove the 'name' field from the request body.
          - Execute. Response should return 400.

# To Do List Note Errors:
    InvalidNoteId:
      admin_steps: 
        - Click *Try it out*.
        - Use a negative number as the note_id.
        - Execute. Response should return 401.
    ToDoListNoteNotFound:
      admin_steps:
        - Click *Try it out*.
        - Set note_id to some valid id that does not exist (for example, 99999).
        - Execute. Response should return 404.

    InvalidToDoListNoteInput:
      admin_steps:          
          - Click *Try it out*.
          - Remove the 'name' field from the request body.
          - Execute. Response should return 400.

    # User Errors
    UserNotFound:
      admin_steps:
        - Click *Try it out*.
        - Set user_id to some valid id that does not exist (for example, 99999).
        - Execute. Response should return 404.

    InvalidUserId:
      admin_steps: 
        - Click *Try it out*.
        - set the "email" field of the request body to the email address of another user.
        - Execute. Response should return 401.

    InvalidAuthInput:
      no_auth_steps: 
        - Click *Try it out*.
        - Remove the @ symbol from the email address.
        - Execute. Response should return 400.
        - Restore the @ symbol to the email address.
        - Shorten the password to be less than 8 characters.
        - Execute. Response should return 400.
        - Restore the password's length.
        - Remove either the "email" or "password" field of the request body.
        - Execute. Response should return 400.
    
    DuplicateEmail:
      no_auth_steps: 
        - Click *Try it out*.
        - Set the "email" field of the request body to the email address of another user.
        - Execute. Response should return 401.

macros:
  test_setup:
    SetupStoreTokens:
      - Use the '/login' endpoint to get a JWT for a user with the ADMIN role. Store it.
      - Use the '/login' endpoint to get a JWT for a user with the USER role. Store it.

  step_lists: 
    EmptyRequestBodyUser:
      - Click *Try it out*.
      - Remove all fields from the response body.
      - Execute. Response should return 400.

    ListMemberPostSuccessUser:
      - Click *Try it out*.
      - Set the listId field of the request body to the id of a list owned of the logged in user.
      - Execute. Response should return 201. Response fields should match request.
    
    ListMemberPostSuccessAdmin:
      - Click *Try it out*.
      - Set the listId field of the request body to the id of a list not owned of the logged in user.
      - Execute. Response should return 201. Response fields should match request.

    ListGetSuccessNoAuth:
      - Click *Try it out*.
      - Set the list_id parameter to the id of public list.
      - Execute. Response should return 200.
    
    ListGetSuccessUser:
      - Click *Try it out*.
      - Set the list_id parameter to the id of a private list owned by the user.
      - Execute. Response should return 200. Response data should be populated.

    ListGetSuccessAdmin:
      - Click *Try it out*.
      - Set the list_id parameter to the id of a private list not owned by the user.
      - Execute. Response should return 200. Response data should be populated.

  responses: 
    ListRequiresAuthentication:
      description: Client is not authenticated, and requested resource requires authentication.
      no_auth_steps:
        - Click *Try it out*.
        - Set the list_id parameter to the id of private list.
        - Execute. Response should return 401.

    ForbiddenListPublic:
      description: User does not have sufficient permissions.
      user_steps:
        - Click *Try it out*.
        - Set the list_id parameter to the id of a private list not owned by the user.
        - Execute. Response should return 403.

    ForbiddenList:
      description: User does not have sufficient permissions.
      user_steps:
        - Click *Try it out*.
        - Set the list_id parameter to the id of any list not owned by the user.
        - Execute. Response should return 403.

    ForbiddenListItemPublic:
      description: User does not have sufficient permissions.
      user_steps:
        - Click *Try it out*.
        - Ensure the item_id parameter is set to an item where the associated list is a private and not owned by the user.
        - Execute. Response should return 403.

    ForbiddenListItem:
      description: User does not have sufficient permissions.
      user_steps:
        - Click *Try it out*.
        - Ensure the item_id parameter is set to an item where the associated list not owned by the user.
        - Execute. Response should return 403.

    ForbiddenListNotePublic:
      description: User does not have sufficient permissions.
      user_steps:
        - Click *Try it out*.
        - Set the list_id parameter to a note where the associated list is a private and not owned by the user.
        - Execute. Response should return 403.

    ForbiddenListNote:
      description: User does not have sufficient permissions.
      user_steps:
        - Click *Try it out*.
        - Ensure the note_id parameter is set to a note where the associated list not owned by the user.
        - Execute. Response should return 403.

    ForbiddenAdminOnly:
        # Replacing a component response. Description required.
        description: User does not have sufficient permissions.
        user_steps:
          - Click *Try it out*.
          - Execute. Response should return 403.
    
    ForbiddenUserId:
        # Replacing a component response. Description required.
        description: User does not have sufficient permissions.
        user_steps:
          - Click *Try it out*.
          - Set user_id to the id of any other existing user.
          - Execute. Response should return 403.


    ForbiddenListMemberPost:
      description: User does not have sufficient permissions.
      user_steps:
        - Click *Try it out*.
        - Set the listId field of the request body to the id of a list not owned of the logged in user.
        - Execute. Response should return 201. Response fields should match request.